name = "og-proxy-worker"
main = "src/worker.js"
compatibility_date = "2026-05-13"

[vars]
GIST_URL = "https://gist.githubusercontent.com/CodeWithOz/69c77a7142c84a33e4f2979eb489b848/raw/posts.json"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
